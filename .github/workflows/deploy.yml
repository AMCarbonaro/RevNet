name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
    
    - name: Install Vercel CLI
      run: npm install --global vercel@latest
    
    - name: Pull Vercel Environment Information
      run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
    
    - name: Build Project Artifacts
      run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
    
    - name: Deploy Project Artifacts to Vercel
      run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
      env:
        VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

  deploy-production:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
    
    - name: Install Vercel CLI
      run: npm install --global vercel@latest
    
    - name: Pull Vercel Environment Information
      run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
    
    - name: Build Project Artifacts
      run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
    
    - name: Deploy Project Artifacts to Vercel
      run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
      env:
        VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    
    - name: Run post-deployment tests
      run: |
        # Wait for deployment to be ready
        sleep 30
        
        # Run smoke tests
        curl -f ${{ secrets.PRODUCTION_URL }}/api/health || exit 1
        curl -f ${{ secrets.PRODUCTION_URL }}/api/letters || exit 1
        curl -f ${{ secrets.PRODUCTION_URL }}/api/projects || exit 1
    
    - name: Notify deployment success
      if: success()
      run: |
        echo "✅ Deployment to production successful!"
        echo "URL: ${{ secrets.PRODUCTION_URL }}"
    
    - name: Notify deployment failure
      if: failure()
      run: |
        echo "❌ Deployment to production failed!"
        exit 1

  deploy-staging:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
    
    - name: Install Vercel CLI
      run: npm install --global vercel@latest
    
    - name: Pull Vercel Environment Information
      run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
    
    - name: Build Project Artifacts
      run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
    
    - name: Deploy Project Artifacts to Vercel
      run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
      env:
        VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    
    - name: Run staging tests
      run: |
        # Wait for deployment to be ready
        sleep 30
        
        # Run staging tests
        curl -f ${{ secrets.STAGING_URL }}/api/health || exit 1
        curl -f ${{ secrets.STAGING_URL }}/api/letters || exit 1
        curl -f ${{ secrets.STAGING_URL }}/api/projects || exit 1
    
    - name: Notify staging deployment
      run: |
        echo "🚀 Deployment to staging successful!"
        echo "URL: ${{ secrets.STAGING_URL }}"

  rollback:
    runs-on: ubuntu-latest
    if: failure() && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
    
    - name: Install Vercel CLI
      run: npm install --global vercel@latest
    
    - name: Rollback to previous deployment
      run: vercel rollback --token=${{ secrets.VERCEL_TOKEN }}
      env:
        VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    
    - name: Notify rollback
      run: |
        echo "🔄 Rollback to previous deployment completed!"

  health-check:
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Health Check
      run: |
        echo "🔍 Running health checks..."
        
        # Check main endpoints
        curl -f ${{ secrets.PRODUCTION_URL }}/api/health || exit 1
        curl -f ${{ secrets.PRODUCTION_URL }}/api/letters || exit 1
        curl -f ${{ secrets.PRODUCTION_URL }}/api/projects || exit 1
        
        # Check database connectivity
        curl -f ${{ secrets.PRODUCTION_URL }}/api/health/database || exit 1
        
        # Check authentication
        curl -f ${{ secrets.PRODUCTION_URL }}/api/auth/signin || exit 1
        
        echo "✅ All health checks passed!"

  performance-check:
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
    
    - name: Install Lighthouse CI
      run: npm install -g @lhci/cli@0.12.x
    
    - name: Run Lighthouse CI
      run: lhci autorun
      env:
        LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        LHCI_TARGET_URL: ${{ secrets.PRODUCTION_URL }}

  security-scan:
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run security scan
      run: |
        echo "🔒 Running security scan..."
        
        # Check for common security headers
        curl -I ${{ secrets.PRODUCTION_URL }} | grep -i "x-frame-options" || echo "Warning: X-Frame-Options header missing"
        curl -I ${{ secrets.PRODUCTION_URL }} | grep -i "x-content-type-options" || echo "Warning: X-Content-Type-Options header missing"
        curl -I ${{ secrets.PRODUCTION_URL }} | grep -i "x-xss-protection" || echo "Warning: X-XSS-Protection header missing"
        
        echo "✅ Security scan completed!"

  notify:
    runs-on: ubuntu-latest
    needs: [deploy-production, health-check, performance-check, security-scan]
    if: always()
    
    steps:
    - name: Notify deployment status
      run: |
        if [ "${{ needs.deploy-production.result }}" == "success" ] && [ "${{ needs.health-check.result }}" == "success" ]; then
          echo "✅ Production deployment successful!"
          echo "🚀 URL: ${{ secrets.PRODUCTION_URL }}"
          echo "📊 Performance: ${{ needs.performance-check.result }}"
          echo "🔒 Security: ${{ needs.security-scan.result }}"
        else
          echo "❌ Production deployment failed!"
          echo "Deploy: ${{ needs.deploy-production.result }}"
          echo "Health: ${{ needs.health-check.result }}"
          echo "Performance: ${{ needs.performance-check.result }}"
          echo "Security: ${{ needs.security-scan.result }}"
        fi
