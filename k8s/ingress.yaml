apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: revolution-network-ingress
  namespace: revolution-network
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - revolutionnetwork.com
    - api.revolutionnetwork.com
    - admin.revolutionnetwork.com
    - developers.revolutionnetwork.com
    secretName: revolution-network-tls
  rules:
  - host: revolutionnetwork.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: revolution-network-service
            port:
              number: 80
  - host: api.revolutionnetwork.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-gateway-service
            port:
              number: 8080
  - host: admin.revolutionnetwork.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: revolution-network-service
            port:
              number: 80
  - host: developers.revolutionnetwork.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: revolution-network-service
            port:
              number: 80
